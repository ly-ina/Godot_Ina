<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Godot MCP Scene Preview</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; display: flex; height: 100vh; }
#sidebar { width: 320px; background: #16213e; padding: 16px; overflow-y: auto; border-right: 1px solid #0f3460; }
#main { flex: 1; display: flex; flex-direction: column; }
#toolbar { padding: 12px 16px; background: #16213e; border-bottom: 1px solid #0f3460; display: flex; gap: 8px; align-items: center; }
#toolbar input { flex: 1; padding: 6px 10px; background: #0f3460; border: 1px solid #533483; color: #e0e0e0; border-radius: 4px; }
#toolbar button { padding: 6px 14px; background: #533483; color: #e0e0e0; border: none; border-radius: 4px; cursor: pointer; }
#toolbar button:hover { background: #e94560; }
#preview { flex: 1; display: flex; align-items: center; justify-content: center; background: #0f3460; overflow: auto; }
#tree { list-style: none; }
#tree li { padding: 4px 8px; cursor: pointer; border-radius: 3px; margin: 2px 0; font-size: 13px; white-space: nowrap; }
#tree li:hover { background: #0f3460; }
#tree li.selected { background: #533483; }
#tree .node-icon { display: inline-block; width: 16px; text-align: center; margin-right: 4px; opacity: 0.7; }
#tree .node-name { font-weight: 500; }
#tree .node-type { color: #888; font-size: 11px; margin-left: 4px; }
#props { padding: 12px; background: #16213e; border-top: 1px solid #0f3460; font-size: 12px; max-height: 200px; overflow-y: auto; }
#props h3 { margin-bottom: 8px; color: #e94560; font-size: 13px; }
#props table { width: 100%; border-collapse: collapse; }
#props td { padding: 3px 8px; border-bottom: 1px solid #0f3460; }
#props td:first-child { color: #888; width: 120px; }
#props td:last-child { color: #e0e0e0; font-family: monospace; font-size: 11px; }
.canvas-node { fill: rgba(255,255,255,0.05); stroke: #533483; stroke-width: 1; }
.canvas-text { fill: #e0e0e0; font-size: 10px; text-anchor: middle; }
</style>
</head>
<body>
<div id="sidebar">
  <h3 style="margin-bottom:12px;color:#e94560;">Scene Tree</h3>
  <ul id="tree"></ul>
</div>
<div id="main">
  <div id="toolbar">
    <input id="sceneInput" placeholder="Paste .tscn path or JSON content..." value="">
    <button onclick="loadScene()">Load</button>
    <button onclick="loadSample()">Sample</button>
  </div>
  <div id="preview">
    <svg id="canvas" width="800" height="500" viewBox="0 0 800 500">
      <rect width="800" height="500" fill="#0f3460" rx="8"/>
      <text x="400" y="250" fill="#555" font-size="14" text-anchor="middle">Load a .tscn file to preview</text>
    </svg>
  </div>
  <div id="props">
    <h3>Properties</h3>
    <div id="propsContent">Select a node to view its properties</div>
  </div>
</div>

<script>
// Lightweight .tscn parser for preview
function parseTscn(text) {
  const nodes = [];
  const lines = text.split('\n');
  let current = null;
  let stack = [];

  for (const line of lines) {
    const trimmed = line.trim();
    if (trimmed.startsWith('[') && trimmed.endsWith(']')) {
      const inner = trimmed.slice(1, -1);
      const parts = inner.split(/\s+/);
      const type = parts[0];

      if (type === 'node') {
        const node = { name: '', type: '', parent: null, props: {}, children: [] };
        for (const p of parts.slice(1)) {
          const [k, ...v] = p.split('=');
          const val = v.join('=');
          if (k === 'name') node.name = val.replace(/"/g, '');
          if (k === 'type') node.type = val.replace(/"/g, '');
          if (k === 'parent') node.parent = val.replace(/"/g, '');
        }
        if (node.parent === '.') node.parent = null;
        nodes.push(node);
      }
    } else if (current && trimmed.includes('=')) {
      const eq = trimmed.indexOf('=');
      const key = trimmed.slice(0, eq).trim();
      const val = trimmed.slice(eq + 1).trim();
      current.props[key] = val;
    }
  }

  // Build tree
  const root = { name: 'Root', type: 'Scene', children: [] };
  const map = { 'null': root };
  for (const n of nodes) map[n.name] = n;
  for (const n of nodes) {
    const p = n.parent ? map[n.parent] : root;
    if (p) p.children.push(n);
    else root.children.push(n);
  }

  return root;
}

function renderTree(node, el, depth = 0) {
  const li = document.createElement('li');
  li.style.paddingLeft = (depth * 16 + 8) + 'px';
  li.innerHTML = `<span class="node-icon">${getIcon(node.type)}</span><span class="node-name">${node.name}</span><span class="node-type">${node.type}</span>`;
  li.onclick = () => selectNode(node, li);
  li.dataset.name = node.name;
  el.appendChild(li);
  for (const child of (node.children || [])) renderTree(child, el, depth + 1);
}

function getIcon(type) {
  const icons = { 'Node2D': '⬡', 'Sprite2D': '🖼', 'CharacterBody2D': '🚶', 'ColorRect': '▮', 'Camera2D': '📷', 'Label': 'T', 'TileMap': '🗺', 'StaticBody2D': '🧱', 'CollisionShape2D': '⬜', 'CanvasLayer': '📄', 'Area2D': '◎', 'Node3D': '⬡3', 'CharacterBody3D': '🚶3', 'Camera3D': '📷3', 'MeshInstance3D': '▤', 'CollisionShape3D': '⬜3' };
  return icons[type] || '●';
}

let sceneData = null;

function loadScene() {
  const input = document.getElementById('sceneInput').value.trim();
  if (!input) return;
  
  let text = input;
  if (!input.startsWith('[gd_scene') && !input.startsWith('{')) {
    // Try as file path - fetch it
    fetch('/api/read-scene?path=' + encodeURIComponent(input))
      .then(r => r.text())
      .then(t => { document.getElementById('sceneInput').value = t; loadSceneFromText(t); })
      .catch(() => loadSceneFromText(input));
    return;
  }
  loadSceneFromText(text);
}

function loadSample() {
  const sample = `[gd_scene load_steps=2 format=3]
[node name="Main" type="Node2D"]
[node name="Player" type="CharacterBody2D" parent="."]
position = Vector2(100, 100)
[node name="Sprite" type="Sprite2D" parent="Player"]
texture = ExtResource("1")
scale = Vector2(0.5, 0.5)
[node name="Camera" type="Camera2D" parent="Player"]
[node name="Ground" type="StaticBody2D" parent="."]
position = Vector2(0, 300)
[node name="GroundVisual" type="ColorRect" parent="Ground"]
color = Color(0.2, 0.5, 0.2, 1)
offset_left = -500; offset_top = -10; offset_right = 500; offset_bottom = 10
[node name="GroundCollision" type="CollisionShape2D" parent="Ground"]
`;
  document.getElementById('sceneInput').value = sample;
  loadSceneFromText(sample);
}

function loadSceneFromText(text) {
  sceneData = parseTscn(text);
  const tree = document.getElementById('tree');
  tree.innerHTML = '';
  renderTree(sceneData, tree);
  updatePreview();
  document.getElementById('propsContent').textContent = 'Click a node to inspect';
}

function selectNode(node, el) {
  document.querySelectorAll('#tree li.selected').forEach(l => l.classList.remove('selected'));
  if (el) el.classList.add('selected');
  showProps(node);
}

function showProps(node) {
  const c = document.getElementById('propsContent');
  if (!node || !node.props) { c.textContent = 'No properties'; return; }
  const keys = Object.keys(node.props);
  if (keys.length === 0) { c.innerHTML = '<em>No properties</em>'; return; }
  let html = '<table>';
  for (const k of keys) html += '<tr><td>' + k + '</td><td>' + escapeHtml(node.props[k]) + '</td></tr>';
  html += '</table>';
  c.innerHTML = html;
}

function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function updatePreview() {
  const svg = document.getElementById('canvas');
  let html = '<rect width="800" height="500" fill="#0f3460" rx="8"/>';
  html += '<text x="400" y="20" fill="#e94560" font-size="12" text-anchor="middle">Scene Preview</text>';
  if (sceneData) drawNode(sceneData, 400, 60, 0, 0);
  svg.innerHTML = html;
}

function drawNode(node, x, y, depth, siblingIdx) {
  const colors = ['#533483', '#e94560', '#0f3460', '#16213e', '#1a1a2e'];
  const color = colors[depth % colors.length];
  const r = Math.max(20, 60 - depth * 8);

  // Node circle
  svgHtml += `<circle cx="${x}" cy="${y}" r="${r}" class="canvas-node" stroke="${color}" stroke-width="1.5"/>`;
  // Label
  const label = node.name.length > 10 ? node.name.slice(0, 9) + '…' : node.name;
  svgHtml += `<text x="${x}" y="${y - 3}" class="canvas-text" font-size="10">${escapeHtml(label)}</text>`;
  svgHtml += `<text x="${x}" y="${y + 10}" class="canvas-text" font-size="8" fill="#888">${node.type}</text>`;

  // Children
  const kids = node.children || [];
  if (kids.length === 0) return;

  const spread = Math.min(120, kids.length * 30);
  const startX = x - spread / 2;
  const nextY = y + 70;

  for (let i = 0; i < kids.length; i++) {
    const cx = startX + (spread / (kids.length - 1 || 1)) * i;
    const cy = nextY;
    svgHtml += `<line x1="${x}" y1="${y + r}" x2="${cx}" y2="${cy - 20}" stroke="${color}" stroke-width="0.5" opacity="0.4"/>`;
    drawNode(kids[i], cx, cy, depth + 1, i);
  }
}

let svgHtml = '';
const origDraw = drawNode;
drawNode = function(node, x, y, depth, idx) {
  svgHtml = '';
  origDraw(node, x, y, depth, idx);
};
</script>
</body>
</html>
