name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "CONTRIBUTING.md"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "CONTRIBUTING.md"
      - "LICENSE"

jobs:
  # ── Multi-platform test matrix ──
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20, 22]
        exclude:
          # macOS + Node 20 always times out on GitHub Actions runners
          - os: macos-latest
            node-version: 20
        include:
          # Also test on latest Ubuntu with latest Node
          - os: ubuntu-24.04
            node-version: 22

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - run: npm install
      - run: npm run build
      - run: npm test

  # ── TypeScript lint (no emit) ──
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - run: npm install
      - run: npx tsc --noEmit

  # ── Validate test fixtures have no broken references ──
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - run: npm install
      - run: npm run build
      - name: Validate test fixtures
        run: node scripts/ci-validate.cjs
